name: GaiaFTCL vQbit Mac Cell — Full Production Cycle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  full-cycle:
    name: Full Cycle (macOS Metal)
    runs-on: macos-latest

    steps:
      # ── Phase 0: Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Phase 0b: Install Rust stable ────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Phase 1: Local build + full test suite ───────────────────────────────
      - name: Phase 1 — cargo test --workspace
        run: cargo test --workspace 2>&1 | tee /tmp/test_out.txt

      - name: Phase 1 — cargo build --release --workspace
        run: cargo build --release --workspace

      - name: Phase 1 — verify binary exists
        run: |
          ls -lh target/release/gaia-metal-renderer
          echo "BINARY_SIZE=$(du -h target/release/gaia-metal-renderer | cut -f1)" >> $GITHUB_ENV

      - name: Phase 1 — extract pass count
        run: |
          PASS=$(grep -E '^test result:' /tmp/test_out.txt | awk '{sum += $4} END {print sum}')
          FAIL=$(grep -E '^test result:' /tmp/test_out.txt | awk '{sum += $6} END {print sum}')
          echo "PASS_COUNT=$PASS" >> $GITHUB_ENV
          echo "FAIL_COUNT=$FAIL" >> $GITHUB_ENV
          echo "Local: $PASS passed, $FAIL failed"
          [ "$FAIL" = "0" ] || (echo "FAIL: $FAIL tests failed" && exit 1)

      # ── Phase 2: Capture commit hash ─────────────────────────────────────────
      - name: Phase 2 — capture commit
        run: echo "COMMIT_HASH=${{ github.sha }}" >> $GITHUB_ENV

      # ── Phase 3: Fresh clone ──────────────────────────────────────────────────
      - name: Phase 3 — fresh clone from GitHub
        run: |
          CLONE_DIR="/tmp/gaiaftcl-verify-${{ github.run_id }}"
          echo "CLONE_DIR=$CLONE_DIR" >> $GITHUB_ENV
          git clone https://github.com/${{ github.repository }}.git "$CLONE_DIR"

      # ── Phase 4: Test fresh clone ─────────────────────────────────────────────
      - name: Phase 4 — cargo test on fresh clone
        run: |
          cd "$CLONE_DIR"
          cargo test --workspace 2>&1 | tee /tmp/fresh_test_out.txt
          FRESH_PASS=$(grep -E '^test result:' /tmp/fresh_test_out.txt | awk '{sum += $4} END {print sum}')
          FRESH_FAIL=$(grep -E '^test result:' /tmp/fresh_test_out.txt | awk '{sum += $6} END {print sum}')
          echo "FRESH_PASS=$FRESH_PASS" >> $GITHUB_ENV
          echo "FRESH_FAIL=$FRESH_FAIL" >> $GITHUB_ENV
          echo "Fresh clone: $FRESH_PASS passed, $FRESH_FAIL failed"
          [ "$FRESH_FAIL" = "0" ] || (echo "FAIL: fresh clone $FRESH_FAIL tests failed" && exit 1)

      # ── Phase 5: Write receipt ────────────────────────────────────────────────
      - name: Phase 5 — write signed receipt
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p evidence
          cat > evidence/full_cycle_receipt.json <<RECEIPT
          {
            "receipt_id": "vqbit-mac-cell-${TIMESTAMP}",
            "spec": "GFTCL-TEST-RUST-001",
            "timestamp": "${TIMESTAMP}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "remote": "https://github.com/${{ github.repository }}.git",
            "phases": {
              "local_build":   "PASS",
              "local_tests":   "PASS — ${PASS_COUNT} passed, 0 failed",
              "git_push":      "PASS — ${{ github.sha }}",
              "fresh_clone":   "${CLONE_DIR}",
              "fresh_tests":   "PASS — ${FRESH_PASS} passed, 0 failed"
            },
            "binary_size": "${BINARY_SIZE}",
            "runner": "${{ runner.os }} ${{ runner.arch }}",
            "rust_toolchain": "stable",
            "status": "FULL_CYCLE_GREEN",
            "witnessed_by": "github-actions",
            "notes": "All phases automated on GitHub-hosted macOS runner. PQ (Metal window launch) requires user witness separately."
          }
          RECEIPT
          cat evidence/full_cycle_receipt.json

      # ── Upload receipt as artifact ────────────────────────────────────────────
      - name: Upload receipt artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-cycle-receipt-${{ github.run_id }}
          path: evidence/full_cycle_receipt.json
          retention-days: 90

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  FULL CYCLE COMPLETE — CERN READY"
          echo "  commit : ${{ github.sha }}"
          echo "  local  : ${PASS_COUNT} tests green"
          echo "  remote : ${FRESH_PASS} tests green (fresh clone)"
          echo "  run    : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "════════════════════════════════════════════════════════"
