[package]
name = "mac_gamp5_observer"
version = "0.1.0"
edition = "2021"
publish = false
description = "Rust external observer games for Mac GAMP5 loop"

[dependencies]
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"

[[bin]]
name = "mac_gamp5_observer"
path = "src/main.rs"
