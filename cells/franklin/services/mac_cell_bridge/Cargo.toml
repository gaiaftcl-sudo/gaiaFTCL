[package]
name = "mac_cell_bridge"
version = "0.1.0"
edition = "2021"
description = "NATS liveness + one subject (MVP). No Arango streaming."
publish = false

[dependencies]
async-nats = "0.35"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["std", "clock"] }

[[bin]]
name = "mac_cell_bridge"
path = "src/main.rs"
