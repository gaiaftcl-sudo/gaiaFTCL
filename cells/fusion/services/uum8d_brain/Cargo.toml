[package]
name = "uum8d_brain"
version = "0.1.0"
edition = "2021"
authors = ["GaiaOS Team"]
description = "UUM-8D Avatar Brain - The ONE canonical brain for avatar communication"

[dependencies]
futures-util = "0.3"
# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Web framework
axum = { version = "0.7", features = ["ws"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }

# NATS messaging
async-nats = "0.35"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Protocol types
avatar_protocol = { path = "../../crates/avatar_protocol", features = ["nats"] }

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# HTTP client for FoT/AKG
reqwest = { version = "0.12", features = ["json"] }

# vChip integration - quantum substrate for all cognition
vchip_client = { path = "../../crates/vchip_client" }
gaiaos_substrate = { path = "../../crates/gaiaos_substrate" }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Metrics
prometheus = "0.13"

[dev-dependencies]
tokio-test = "0.4"


# Consciousness layer
gaiaos_introspection = { path = "../gaiaos_introspection" }
