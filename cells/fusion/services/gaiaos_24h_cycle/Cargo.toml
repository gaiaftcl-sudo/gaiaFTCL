[package]
name = "gaiaos_24h_cycle"
version = "0.1.0"
edition = "2021"
description = "GaiaOS 24-Hour Consciousness Cycle - Substrate Test Plan"

[[bin]]
name = "gaiaos-24h-cycle"
path = "src/main.rs"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
axum = "0.7"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }

# Consciousness layer
async-nats = "0.36"
gaiaos_introspection = { path = "../gaiaos_introspection" }
