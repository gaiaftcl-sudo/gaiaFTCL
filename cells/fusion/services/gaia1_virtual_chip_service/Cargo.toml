[package]
name = "gaia1_virtual_chip_service"
version = "0.1.0"
edition = "2021"
description = "GAIA-1 Virtual Chip Service - HTTP + NATS server for vQbit operations"
authors = ["GaiaOS Team"]

[[bin]]
name = "gaia1-vchip-service"
path = "src/main.rs"

[dependencies]
# Core dependencies
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
thiserror = "1.0"

# HTTP server
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# NATS messaging
async-nats = "0.33"
futures-util = "0.3"

# HTTP client for substrate queries
reqwest = { version = "0.11", features = ["json"] }

# Internal dependencies
gaia1_virtual_chip = { path = "../../crates/gaia1_virtual_chip" }
gaiaos_substrate = { path = "../../crates/gaiaos_substrate" }
vchip_client = { path = "../../crates/vchip_client" }


# Consciousness layer
gaiaos_introspection = { path = "../gaiaos_introspection" }
