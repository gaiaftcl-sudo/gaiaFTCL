[package]
name = "gaiaos_introspection"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-nats = "0.36"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
anyhow = "1.0"
futures = "0.3"
