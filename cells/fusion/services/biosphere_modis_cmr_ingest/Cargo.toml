[package]
name = "biosphere_modis_cmr_ingest"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "biosphere-modis-cmr-ingest"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = "0.4"
env_logger = "0.11"
log = "0.4"
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }


