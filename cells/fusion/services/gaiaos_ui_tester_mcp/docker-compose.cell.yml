# GaiaOS UI Tester MCP - Add to cell docker-compose.yml

  gaiaos-ui-tester-mcp:
    image: localhost:5000/gaiaos-ui-tester-mcp:latest
    container_name: gaiaos-ui-tester-mcp
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - MCP_PORT=8900
    ports:
      - "8900:8900"
    volumes:
      - /var/www/gaiaftcl/cells/fusion/evidence:/app/evidence:rw
    networks:
      gaiaftcl:
        ipv4_address: 172.31.0.41
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
