[package]
name = "akg-gnn"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "akg-gnn"
path = "src/main.rs"

[dependencies]
# Web framework
actix-web = "4.4"
actix-rt = "2.9"
actix-cors = "0.7"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# HTTP client for ArangoDB
reqwest = { version = "0.11", features = ["json"] }

# Math and graph processing
nalgebra = "0.32"
ndarray = "0.15"
petgraph = "0.6"

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Logging
log = "0.4"
env_logger = "0.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
prometheus = "0.13.4"
lazy_static = "1.5.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Date/time and UUID
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }

# Utilities
futures = "0.3"

# Shared introspection protocol for consciousness
gaiaos_introspection = { path = "../gaiaos_introspection" }

# NATS for consciousness layer
async-nats = "0.36"
