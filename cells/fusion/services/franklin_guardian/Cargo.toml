[workspace]

[package]
name = "franklin_guardian"
version = "0.1.0"
edition = "2021"
description = "Franklin Guardian - Constitutional Oversight Engine for GaiaOS AGI"
authors = ["GaiaOS Team"]

[[bin]]
name = "franklin-guardian"
path = "src/main.rs"

[lib]
name = "franklin_guardian"
path = "src/lib.rs"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# Async
futures = "0.3"
async-trait = "0.1"

# Time
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "1"
anyhow = "1"

# Config
dotenvy = "0.15"

# Random (for jitter)
rand = "0.8"

# Hashing (for proof markers)
sha2 = "0.10"

# Shared introspection protocol for consciousness
gaiaos_introspection = { path = "../gaiaos_introspection" }
async-nats = "0.36"
# uum8d = { path = "../../ftclstack/uum8d" }

[dev-dependencies]
tokio-test = "0.4"
