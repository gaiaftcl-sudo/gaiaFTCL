[package]
name = "biosphere_noaa_gfs_biosphere_ingest"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "biosphere-noaa-gfs-biosphere-ingest"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
chrono = "0.4"
env_logger = "0.11"
log = "0.4"
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
serde_json = "1.0"
tokio = { version = "1.35", features = ["full"] }


