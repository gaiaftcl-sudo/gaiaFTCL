[package]
name = "airplanes_live_ingest"
version = "0.1.0"
edition = "2021"
description = "GaiaOS Aircraft Ingest from airplanes.live API - FREE global aircraft data"

[[bin]]
name = "airplanes_live_ingest"
path = "src/main.rs"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4"] }
log = "0.4"
env_logger = "0.11"
anyhow = "1.0"

