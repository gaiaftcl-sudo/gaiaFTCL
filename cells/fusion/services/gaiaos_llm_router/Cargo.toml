[package]
name = "gaiaos_llm_router"
version = "2.0.0"
edition = "2021"
description = "GaiaOS Multimodal LLM Router v2 - Unified API for all GaiaOS LM profiles with streaming"

[[bin]]
name = "gaiaos-llm-router"
path = "src/main.rs"

[dependencies]
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
futures-util = "0.3"
chrono = "0.4"

# Consciousness layer
async-nats = "0.36"
gaiaos_introspection = { path = "../gaiaos_introspection" }
