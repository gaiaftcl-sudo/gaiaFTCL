[package]
name = "gaiaos_validation"
version = "0.1.0"
edition = "2021"
description = "GaiaOS IQ/OQ/PQ Validation Service - Gates AGI mode through explicit validation"
authors = ["GaiaOS Team"]

[[bin]]
name = "gaiaos-validation"
path = "src/main.rs"

[lib]
name = "gaiaos_validation"
path = "src/lib.rs"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# ArangoDB client
arangors = "0.6"

# HTTP client for calling other services
reqwest = { version = "0.12", features = ["json"] }

# Async utilities
futures = "0.3"
async-trait = "0.1"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# UUID generation
uuid = { version = "1", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
prometheus = "0.13.4"
lazy_static = "1.5.0"

# Error handling
thiserror = "1"
anyhow = "1"

# Statistics
statrs = "0.17"

# Regex
regex = "1"

# Configuration
dotenvy = "0.15"

# Shared introspection protocol for consciousness
gaiaos_introspection = { path = "../gaiaos_introspection" }
gaiaos_agent = { path = "../../crates/gaiaos_agent" }
async-nats = "0.36"

[dev-dependencies]
tokio-test = "0.4"
