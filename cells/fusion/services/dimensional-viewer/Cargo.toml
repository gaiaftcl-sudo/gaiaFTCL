[workspace]
members = ["client", "server", "shared"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["GaiaOS Team"]

[workspace.dependencies]
# Shared dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
uuid = { version = "1.10", features = ["v4", "serde", "js"] }

# Math
nalgebra = "0.33"
glam = "0.27"

# Async
tokio = { version = "1.0", features = ["full"] }

# Networking
reqwest = { version = "0.11", default-features = false, features = [
    "json",
    "rustls-tls",
] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.release-wasm]
inherits = "release"
opt-level = "s"      # Optimize for size in WASM
panic = "abort"
