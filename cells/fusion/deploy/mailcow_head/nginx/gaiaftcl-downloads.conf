# GaiaFTCL DMG — dl subdomain (apex /downloads/ lives in moltbook.conf)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dl.gaiaftcl.com;

    ssl_certificate /opt/gaia/ssl/gaiaftcl.crt;
    ssl_certificate_key /opt/gaia/ssl/gaiaftcl.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /downloads/ {
        alias /var/www/gaiaftcl-downloads/;
        autoindex off;
        default_type application/octet-stream;
    }

    location = /dmgInstall {
        alias /var/www/gaiaftcl-downloads/GaiaFTCL-latest.dmg;
        add_header Content-Type application/x-apple-diskimage;
        add_header Content-Disposition "attachment; filename=\"GaiaFTCL.dmg\"";
    }

    location = / {
        return 302 /downloads/;
    }
}
