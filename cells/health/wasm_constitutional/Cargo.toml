[package]
name        = "gaia-health-substrate"
version     = "0.1.0"
edition     = "2021"
description = "GaiaHealth WASM constitutional substrate — 8 deterministic safety exports"
license     = "LicenseRef-GaiaHealth-Source-Available"

[lib]
crate-type = ["cdylib"]  # required for wasm-bindgen / wasm-pack

[dependencies]
wasm-bindgen = "0.2"
serde        = { workspace = true }
serde_json   = { workspace = true }

[profile.release]
opt-level = "z"   # minimize binary size
lto       = true
panic     = "abort"

# Build: wasm-pack build --target web --release
