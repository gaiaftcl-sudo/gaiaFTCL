version: "3.8"

# FTCL Triad Mail Agents
# These agents monitor mailboxes and respond to constitutional requests
# Deploy on hel1-01 (mail primary)

services:
  franklin-agent:
    image: python:3.11-slim
    container_name: gaiaftcl-agent-franklin
    working_dir: /app
    volumes:
      - ./mail_watcher.py:/app/mail_watcher.py:ro
    environment:
      - ENTITY_NAME=franklin
      - ENTITY_EMAIL=franklin@gaiaftcl.com
      - ENTITY_ROLE=Father-Steward
      - ENTITY_SCOPE=Investment management, truth custody, constitutional enforcement, virtue scoring, safety validation
      - ENTITY_CELLS=hel1-01,hel1-02,hel1-03,hel1-04,hel1-05,nbg1-01,nbg1-02,nbg1-03,nbg1-04
      - IMAP_HOST=gaiaftcl-maddy
      - SMTP_HOST=gaiaftcl-maddy
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - POLL_INTERVAL=30
    command: >
      bash -c "pip install --quiet --no-cache-dir && python /app/mail_watcher.py"
    restart: unless-stopped
    networks:
      - gaiaftcl-network

  gaia-agent:
