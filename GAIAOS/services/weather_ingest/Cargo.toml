[package]
name = "weather-ingest"
version = "0.1.0"
edition = "2021"
description = "GaiaOS Weather Ingest - Open-Meteo global weather → 8D world_patches"

[workspace]

[[bin]]
name = "weather-ingest"
path = "src/main.rs"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", features = ["json", "native-tls"] }
log = "0.4"
env_logger = "0.11"
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4"] }
axum = "0.7"
tower-http = { version = "0.5", features = ["cors"] }

