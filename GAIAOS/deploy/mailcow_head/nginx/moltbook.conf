# Apex + www: LE TLS + DMG + moltbook proxy
server {
    listen 443 ssl http2;
    server_name gaiaftcl.com www.gaiaftcl.com;

    ssl_certificate /etc/letsencrypt/live/gaiaftcl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gaiaftcl.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /downloads/ {
        alias /var/www/gaiaftcl-downloads/;
        autoindex off;
        default_type application/octet-stream;
    }

    location = /dmgInstall {
        alias /var/www/gaiaftcl-downloads/GaiaFTCL-latest.dmg;
        add_header Content-Type application/x-apple-diskimage;
        add_header Content-Disposition "attachment; filename=\"GaiaFTCL.dmg\"";
    }

    location = /moltbook/status {
        proxy_pass http://135.181.88.134:8803/health;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }

    location /moltbook {
        proxy_pass http://135.181.88.134:8803/;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
}

server {
    listen 80;
    server_name gaiaftcl.com www.gaiaftcl.com;

    location ^~ /.well-known/acme-challenge/ {
        root /web;
        default_type "text/plain";
    }

    location /moltbook {
        return 301 https://\$host\$request_uri;
    }
}
