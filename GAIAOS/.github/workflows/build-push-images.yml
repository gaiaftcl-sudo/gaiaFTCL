name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'quantum_substrate/**'
      - 'virtue_engine/**'
      - 'franklin_validator/**'
      - 'gasm_runtime/**'
      - 'services/**'
      - 'deploy/docker/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  ORG: gaiaftcl

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD RUST SERVICES
  # ═══════════════════════════════════════════════════════════════════════════
  build-rust:
    name: Build Rust Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: quantum-substrate
            target: substrate
            dockerfile: deploy/docker/Dockerfile.cell-all
          - name: virtue-engine
            target: virtue
            dockerfile: deploy/docker/Dockerfile.cell-all
          - name: game-runner
            target: game-runner
            dockerfile: deploy/docker/Dockerfile.cell-all
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=branch
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD PYTHON SERVICES
  # ═══════════════════════════════════════════════════════════════════════════
  build-python:
    name: Build Python Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp-gateway
            context: services/fot_mcp_gateway
            dockerfile: services/fot_mcp_gateway/Dockerfile
          - name: franklin-guardian
            context: services/franklin_guardian
            dockerfile: services/franklin_guardian/Dockerfile
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=branch
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFY COMPLETION
  # ═══════════════════════════════════════════════════════════════════════════
  notify:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [build-rust, build-python]
    if: always()
    
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Services | ${{ needs.build-rust.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Services | ${{ needs.build-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images available at: \`ghcr.io/gaiaftcl/*\`" >> $GITHUB_STEP_SUMMARY
