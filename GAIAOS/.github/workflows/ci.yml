name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # RUST TESTS
  # ═══════════════════════════════════════════════════════════════════════════
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true  # Don't fail on warnings for now
      
      - name: Build
        run: cargo build --workspace --release
      
      - name: Test
        run: cargo test --workspace --release
        continue-on-error: true  # Some tests may be integration-only

  # ═══════════════════════════════════════════════════════════════════════════
  # PYTHON TESTS
  # ═══════════════════════════════════════════════════════════════════════════
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx fastapi uvicorn pydantic
      
      - name: Run Python tests
        run: |
          # Find and run any pytest files
          python -m pytest services/ -v --ignore=services/node_modules || true
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # DOCKER BUILD TEST
  # ═══════════════════════════════════════════════════════════════════════════
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-rust]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build quantum-substrate
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.cell-all
          target: substrate
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build virtue-engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.cell-all
          target: virtue
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
