name: GaiaFusion GAMP 5 Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validation:
    name: GAMP 5 Validation CI
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Build config CLI
        working-directory: macos/GaiaFusion
        run: |
          cd tools/gaiafusion-config-cli
          cargo build --release
      
      - name: Run IQ Validation
        working-directory: macos/GaiaFusion
        run: zsh scripts/run_iq_validation.sh

      - name: Run OQ Validation
        working-directory: macos/GaiaFusion
        run: zsh scripts/run_oq_validation.sh

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gamp5-evidence
          path: macos/GaiaFusion/evidence/
          retention-days: 90
