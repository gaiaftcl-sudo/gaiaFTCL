name: Self-State Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'gaiaos-web/**'
      - 'services/gaiaos_ui/**'
      - 'config/self_model/**'
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_full_campaign:
        description: 'Run full validation campaign (not just sanity)'
        type: boolean
        default: false

env:
  GAIAOS_URL: ${{ secrets.GAIAOS_URL || 'https://gaiaos.cloud' }}

jobs:
  sanity:
    name: Self-State Sanity Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gaiaos-web/package-lock.json
      
      - name: Install dependencies
        working-directory: gaiaos-web
        run: npm ci
      
      - name: Run self-state sanity check
        working-directory: gaiaos-web
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       GaiaOS Self-State CI Validation                      ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "API: $GAIAOS_URL"
          echo ""
          
          # Run sanity check
          npx ts-node tests/validation/self_state_validation.ts sanity || {
            echo "❌ Self-state sanity check failed"
            exit 1
          }
        env:
          GAIAOS_URL: ${{ env.GAIAOS_URL }}
      
      - name: Capture snapshot
        if: success()
        working-directory: gaiaos-web
        run: |
          npx ts-node tests/validation/self_state_validation.ts snapshot ci_build_${{ github.run_number }}
        env:
          GAIAOS_URL: ${{ env.GAIAOS_URL }}
      
      - name: Upload snapshot artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: self-state-snapshot-${{ github.run_number }}
          path: logs/self_state/*.json
          retention-days: 30

  build-validation:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gaiaos-web/package-lock.json
      
      - name: Install dependencies
        working-directory: gaiaos-web
        run: npm ci
      
      - name: TypeScript check
        working-directory: gaiaos-web
        run: npx tsc --noEmit
      
      - name: Build frontend
        working-directory: gaiaos-web
        run: npm run build
      
      - name: Check self-model components exist
        run: |
          echo "Checking self-model components..."
          test -f gaiaos-web/src/core/selfModel8D.ts && echo "✅ selfModel8D.ts"
          test -f gaiaos-web/src/components/self/CompleteSelfModelPanel.tsx && echo "✅ CompleteSelfModelPanel.tsx"
          test -f gaiaos-web/src/components/self/Global8DStatusIndicator.tsx && echo "✅ Global8DStatusIndicator.tsx"
          test -f gaiaos-web/src/components/self/SelfHeatmap8D.tsx && echo "✅ SelfHeatmap8D.tsx"
          test -f config/self_model/targets.json && echo "✅ targets.json"
          echo "All self-model components present"

  full-campaign:
    name: Full Validation Campaign
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_full_campaign == 'true' || github.event_name == 'schedule' }}
    needs: [sanity, build-validation]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gaiaos-web/package-lock.json
      
      - name: Install dependencies
        working-directory: gaiaos-web
        run: npm ci
      
      - name: Run full validation suite
        working-directory: gaiaos-web
        run: |
          npx ts-node tests/validation/self_state_validation.ts full
        env:
          GAIAOS_URL: ${{ env.GAIAOS_URL }}
      
      - name: Generate validation report
        if: always()
        run: |
          echo "# Self-State Validation Report" > validation_report.md
          echo "" >> validation_report.md
          echo "**Run:** ${{ github.run_number }}" >> validation_report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> validation_report.md
          echo "**Commit:** ${{ github.sha }}" >> validation_report.md
          echo "" >> validation_report.md
          echo "## Snapshots" >> validation_report.md
          echo "" >> validation_report.md
          ls -la logs/self_state/*.json 2>/dev/null || echo "No snapshots captured"
      
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_number }}
          path: |
            validation_report.md
            logs/self_state/*.json
          retention-days: 90

