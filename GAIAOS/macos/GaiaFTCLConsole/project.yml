name: GaiaFTCLConsole
options:
  bundleIdPrefix: com.fortressai
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.2.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.6.0
targets:
  GaiaFTCLConsole:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources: [Sources/GaiaFTCLConsole]
    dependencies:
      - package: SwiftTerm
      - package: Sparkle
        product: Sparkle
    settings:
      CODE_SIGN_IDENTITY: "-"
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: "GaiaFTCLConsole.entitlements"
      SUFeedURL: "https://github.com/fortressai/gaiaftcl/releases/latest/download/appcast.xml"
      SUPublicEDKey: "placeholder_public_key"
    postCompileScripts:
      - script: |
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/scripts"
          cp -f "$SRCROOT/../../../scripts/gamp5_iq.sh" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/scripts/" || true
          cp -f "$SRCROOT/../../../scripts/gamp5_oq.sh" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/scripts/" || true
          cp -f "$SRCROOT/../../../scripts/gamp5_pq.sh" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/scripts/" || true
          cp -f "$SRCROOT/../../GaiaHealth/scripts/iq_install.sh" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/scripts/" || true
          cp -f "$SRCROOT/../../GAIAFTCL/scripts/oq_validate.sh" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/scripts/" || true
        name: "Copy Legacy Scripts"
